name: Daily Paper Trader

on:
  schedule:
    # Runs at 9:00 AM PDT (16:00 UTC) every day
    - cron: '0 16 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write  # Needed to commit state back

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests numpy pandas scipy

      - name: Run paper trader
        working-directory: live_trading
        run: |
          python run_paper_trader.py --force 2>&1 | tee run_output.txt

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live_trading/paper_state.json
          git add live_trading/paper_trading.log 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Paper trade $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
